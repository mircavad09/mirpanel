name: Fix mobile zoom and menu section links

on:
  push:
    branches:
      - codex/admin-managed-site-sections
    paths:
      - scripts/fix-mobile-zoom-menu.mjs
      - .github/workflows/fix-mobile-zoom-menu.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-mobile-menu-fix:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip mobile-menu-fix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply admin-managed site sections
        run: node scripts/fix-mobile-zoom-menu.mjs

      - name: Commit admin-managed site section fixes
        run: |
          if git diff --quiet -- app.js index.html mirpanel-admin/core.mjs mirpanel-admin/public/admin.html mirpanel-admin/public/admin.js; then
            echo "Admin-managed site sections already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js index.html mirpanel-admin/core.mjs mirpanel-admin/public/admin.html mirpanel-admin/public/admin.js
          git commit -m "Apply admin-managed site sections [skip mobile-menu-fix]"
          git push origin HEAD:${{ github.ref_name }}
